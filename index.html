<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sampurna — Engineering Docs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E1320; --panel:#141B2B; --panel2:#172033; --ink:#EAEEF6; --muted:#9AA6BC; --faint:#6E7A92;
    --line:#222C40; --line2:#2C3650;
    --green:#46C98B; --green-d:#1C7A53; --green-bg:#13261F;
    --blue:#5B8DEF; --blue-bg:#142036; --blue-ln:#2A3E66;
    --teal:#34C6C0; --teal-bg:#11272B; --teal-d:#1F5C58;
    --amber:#E0A537; --amber-bg:#2A2113; --amber-ln:#5A4413;
    --red:#E5705F; --red-bg:#2A1715; --red-ln:#5A2A22;
    --violet:#9B8CFF; --violet-bg:#1B1830; --violet-ln:#3A3168;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --disp:'Space Grotesk',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif;
    --shadow:0 12px 34px rgba(0,0,0,.42);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion: reduce){ html{scroll-behavior:auto} *{animation:none!important;transition:none!important} }
  body{margin:0;background:
      radial-gradient(1000px 460px at 82% -8%,rgba(155,140,255,.10),transparent 60%),
      radial-gradient(820px 460px at -8% 8%,rgba(52,198,192,.08),transparent 55%),var(--bg);
    color:var(--ink);font-family:var(--body);font-size:15.5px;line-height:1.62;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px}
  a{color:inherit}

  .topnav{position:sticky;top:0;z-index:40;background:rgba(14,19,32,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .topnav .wrap{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:12px 22px}
  .topnav .brand{font-family:var(--mono);font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);font-weight:600;margin-right:auto}
  .topnav .count{font-family:var(--mono);font-size:11px;color:var(--faint)}

  .hero{padding:56px 0 20px}
  .kchip{display:inline-flex;gap:8px;align-items:center;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);font-weight:600;border:1px solid var(--teal);border-radius:30px;padding:5px 13px;background:var(--teal-bg)}
  h1{font-family:var(--disp);font-weight:700;font-size:clamp(28px,5vw,46px);line-height:1.05;letter-spacing:-.02em;margin:18px 0 14px}
  h1 .g{background:linear-gradient(90deg,#9B8CFF,#34C6C0);-webkit-background-clip:text;background-clip:text;color:transparent}
  .lede{font-size:17px;color:#C2CCDE;max-width:640px;margin:0}

  .searchbar{margin-top:26px;position:relative;max-width:420px}
  .searchbar input{width:100%;font-family:var(--body);font-size:14.5px;color:var(--ink);background:var(--panel);
    border:1px solid var(--line);border-radius:11px;padding:11px 14px 11px 38px;outline:none}
  .searchbar input:focus{border-color:var(--teal2, var(--teal));box-shadow:0 0 0 3px rgba(52,198,192,.16)}
  .searchbar input::placeholder{color:var(--faint)}
  .searchbar svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.55}
  .no-results{display:none;color:var(--faint);font-family:var(--mono);font-size:12.5px;margin-top:10px}

  .sec{padding:38px 0 4px}
  .sec-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .seclabel{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600}
  .sec h2{font-family:var(--disp);font-weight:600;font-size:clamp(20px,3vw,26px);letter-spacing:-.01em;margin:6px 0 4px;color:#fff}
  .sec .sub{color:var(--muted);margin:0 0 6px;max-width:680px}
  .sec-count{font-family:var(--mono);font-size:11px;color:var(--faint);border:1px solid var(--line2);border-radius:20px;padding:2px 9px;white-space:nowrap}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin:16px 0 8px}
  .card{display:block;text-decoration:none;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:17px 18px;box-shadow:var(--shadow);transition:transform .15s ease, border-color .15s ease;}
  .card:hover, .card:focus-visible{transform:translateY(-2px);border-color:var(--line2)}
  .card:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  .card h3{font-family:var(--disp);font-weight:600;font-size:16px;margin:0 0 6px;color:#fff;letter-spacing:-.005em}
  .card p{margin:0 0 12px;color:var(--muted);font-size:13.5px;line-height:1.55}
  .card .path{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;
    border-radius:6px;padding:3px 8px}
  .card.general .path{color:#9FE3D0;background:var(--green-bg);border:1px solid var(--green-d)}
  .card.tasks .path{color:#C7D2FF;background:var(--violet-bg);border:1px solid var(--violet-ln)}

  footer{padding:50px 0 60px;color:var(--faint);font-family:var(--mono);font-size:11px;border-top:1px solid var(--line);margin-top:30px}
</style>
</head>
<body>

<nav class="topnav"><div class="wrap">
  <span class="brand">Sampurna · Engineering Docs</span>
  <span class="count" id="liveCount"></span>
</div></nav>

<header class="hero"><div class="wrap">
  <span class="kchip">● Internal doc index</span>
  <h1>All engineering <span class="g">docs, in one place</span></h1>
  <p class="lede">Generated reviews, audits, and task write-ups for the SFSPL platform. Pick a section below, or search across everything.</p>

  <div class="searchbar">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9AA6BC" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="Search docs by title, file, or keyword…" aria-label="Search docs">
  </div>
  <p class="no-results" id="noResults">No docs match “<span id="noResultsTerm"></span>”.</p>
</div></header>

<main id="sections"></main>

<footer><div class="wrap">Sampurna Financial Services Pvt. Ltd. — generated doc index</div></footer>

<script>
/* ============================================================
   DOC INDEX — edit ONLY this array to add sections or files.
   No other code needs to change.

   To add a new file to an existing section:
     -> add one { file, title, desc } object to that section's `files` array.

   To add a brand-new section (new folder of docs):
     -> copy the { id, label, folder, sub, files:[...] } block below,
        change id/label/folder/sub, list its files, and put the new
        .html files in a matching folder next to this index.html
        (e.g. folder: "reviews" -> ./reviews/yourfile.html)
   ============================================================ */
  const SECTIONS = [
    {
      id: 'general',
      label: 'General',
      folder: 'general',
      sub: 'Platform-wide reviews and audits — not tied to one task.',
      files: [
        { file: 'api_inventory.html', title: 'API Inventory', desc: 'Full map of the HTTP & WebSocket surface — every endpoint and the engine modules behind them.' },
        { file: 'folder_reorganization.html', title: 'Folder Reorganization', desc: 'How the two catch-all directories should split into subfolders, with no behaviour change.' },
        { file: 'security_review.html', title: 'Security Review', desc: 'An honest read of the platform\u2019s security posture — what\u2019s solid, what\u2019s a gap, and what to do.' },
        { file: 'unused_code_audit.html', title: 'Unused Code Audit', desc: 'Every module nothing imports or wires in — roughly 4,500 lines of dead code found.' },
      ]
    },
    {
      id: 'tasks',
      label: 'Task',
      folder: 'tasks',
      sub: 'Deep-dives on specific, actionable engineering tasks.',
      files: [
        { file: 'task1_ai_optimization.html', title: 'Task 1 — AI Pipeline Optimization', desc: 'Two silent retrieval-layer issues costing speed and answer quality, and the fix.' },
        { file: 'task2_rate_limiting.html', title: 'Task 2 — Rate Limiting, Done Right', desc: 'The limiter is stored in the wrong place, and it can\u2019t reach the WebSocket paths that need it most.' },
        { file: 'task3_split_admin_router.html', title: 'Task 3 — Split admin_router.py', desc: 'Breaking a 4,793-line, 61-endpoint router into ~10 focused routers with zero behaviour change.' },
        { file: 'task4_dependency_cleanup.html', title: 'Task 4 — Dependency Cleanup & Docker Slimming', desc: '282 pinned packages, including libraries never imported — exactly what to cut.' },
        { file: 'task5_signup_onboarding.html', title: 'Task 5 — Signup / Onboarding Flow', desc: 'Building the public front door: self-serve signup that provisions a tenant, admin, and workspace.' },
        { file: 'task6_security_lockdown.html', title: 'Task 6 — Proxy & Security Lockdown', desc: 'Strong headers already in place, but proxy headers are trusted blindly and CORS falls back to a wildcard.' },
        { file: 'task7_error_monitoring_logging.html', title: 'Task 7 — Error Monitoring & Logging', desc: 'Turning "the client tells us it broke" into real alerts, history, and per-client error tracking.' },
        { file: 'task8_schema_datamodel_design.html', title: 'Task 8 — Multi-Tenancy Schema & Data-Model Design', desc: 'Deciding, on paper, what a tenant database holds and how 20 databases stay in step with one codebase.' },
        { file: 'task9_cicd_pipeline.html', title: 'Task 9 — CI/CD Pipeline Setup', desc: 'Replacing manual SSH deploys with a pipeline that checks a commit before it reaches production.' },
        { file: 'task10_websocket_session_auth.html', title: 'Task 10 — Refactor WebSocket + session_auth', desc: 'WebSockets that never actually authenticate, and two competing session systems, cleaned up.' },
        { file: 'task11_multitenancy_isolation.html', title: 'Task 11 — Multi-Tenancy & Data Isolation', desc: 'Making one codebase safely serve many customers, grounded in the real 46-table schema.' },
      ]
    },
  ];
/* ============================================================ */

  const main = document.getElementById('sections');
  const totalFiles = SECTIONS.reduce((n, s) => n + s.files.length, 0);
  document.getElementById('liveCount').textContent = `${SECTIONS.length} sections · ${totalFiles} docs`;

  function cardHTML(sectionId, folder, f){
    const path = `${folder}/${f.file}`;
    return `<a class="card ${sectionId}" href="${path}">
      <h3>${f.title}</h3>
      <p>${f.desc || ''}</p>
      <span class="path">${path}</span>
    </a>`;
  }

  SECTIONS.forEach(sec => {
    const section = document.createElement('section');
    section.className = 'sec';
    section.dataset.sectionId = sec.id;
    section.innerHTML = `
      <div class="sec-head">
        <div>
          <span class="seclabel">${sec.label}</span>
          <h2>${sec.label}</h2>
        </div>
        <span class="sec-count">${sec.files.length} doc${sec.files.length === 1 ? '' : 's'}</span>
      </div>
      <p class="sub">${sec.sub || ''}</p>
      <div class="grid">${sec.files.map(f => cardHTML(sec.id, sec.folder, f)).join('')}</div>
    `;
    main.appendChild(section);
  });

  // Simple client-side filter across title, description, and filename
  const searchInput = document.getElementById('searchInput');
  const noResults = document.getElementById('noResults');
  const noResultsTerm = document.getElementById('noResultsTerm');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    let anyVisible = false;

    document.querySelectorAll('.sec').forEach(sec => {
      let sectionHasVisible = false;
      sec.querySelectorAll('.card').forEach(card => {
        const hay = card.textContent.toLowerCase();
        const match = !q || hay.includes(q);
        card.style.display = match ? '' : 'none';
        if (match) sectionHasVisible = true;
      });
      sec.style.display = sectionHasVisible ? '' : 'none';
      if (sectionHasVisible) anyVisible = true;
    });

    noResults.style.display = (!anyVisible && q) ? 'block' : 'none';
    noResultsTerm.textContent = searchInput.value.trim();
  });
</script>
</body>
</html>
